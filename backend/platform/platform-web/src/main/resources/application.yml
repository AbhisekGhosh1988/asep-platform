spring:
  application:
    name: asep
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  datasource:
    url: jdbc:postgresql://localhost:5432/asep
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate

    open-in-view: false
  ai:
    ollama:
      base-url: http://localhost:11434

      chat:
        options:
          model: llama3.1
          temperature: 0.2


application:
  version: 1.0.0-SNAPSHOT

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: "*"

springdoc:
  api-docs:
    path: /api-docs

  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true

asep:
  security:
    jwt:
      secret: 1234567890123456789012345678901234567890123456789012345678901234
      access-token-validity: 3600000
      refresh-token-validity: 604800000
  storage:
    location: uploads
  ai:
    ollama:
      base-url: http://localhost:11434
      model: llama3.1
      temperature: 0.2


logging:
  level:
    org.springframework.security: INFO



